  build-windows:
    permissions:
      contents: write  # Grants access to create/update releases and tags

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1.13.0
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Compile UI/QRC files
      run: |
        pyside6-uic mainWindow.ui -o ui_mainWindow.py
        pyside6-uic ThemeGrid.ui -o ui_ThemeGrid.py
        pyside6-uic WaninCheckGrid.ui -o ui_WaninCheckGrid.py
        pyside6-uic D2xCheckGrid.ui -o ui_D2xCheckGrid.py
        pyside6-rcc resource.qrc -o rc_resource.py
    - name: Build Package
      run: |
        python -m nuitka --show-progress --assume-yes-for-downloads main.py --standalone --windows-icon-from-ico=assets/icon.png --enable-plugin=pyside6 -o ModMiiDownloader.exe
        copy *.py main.dist
        copy downloader.json main.dist
        7z a modmiiDownloader.zip -- main.dist/
    - name: Create Release
      uses: ncipollo/release-action@v1.21.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: "modmiiDownloader.zip"
        allowUpdates: true
        omitBodyDuringUpdate: true
        replacesArtifacts: true
        tag: "main"

  build-windows-onefile:
    permissions:
      contents: write  # Grants access to create/update releases and tags

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1.13.0
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Compile UI/QRC files
      run: |
        pyside6-uic mainWindow.ui -o ui_mainWindow.py
        pyside6-uic ThemeGrid.ui -o ui_ThemeGrid.py
        pyside6-uic WaninCheckGrid.ui -o ui_WaninCheckGrid.py
        pyside6-uic D2xCheckGrid.ui -o ui_D2xCheckGrid.py
        pyside6-rcc resource.qrc -o rc_resource.py
    - name: Build Onefile Package
      run: |
        python -m nuitka --show-progress --assume-yes-for-downloads main.py --onefile --windows-icon-from-ico=assets/icon.png --enable-plugin=pyside6 -o ModMiiDownloader.exe
        copy *.py main.dist
        copy downloader.json main.dist
        7z a modmiiDownloader-onefile.zip -- main.dist/
    - name: Create Onefile Release
      uses: ncipollo/release-action@v1.21.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: "modmiiDownloader-onefile.zip"
        allowUpdates: true
        omitBodyDuringUpdate: true
        replacesArtifacts: true
        tag: "main"
