# This workflow will install Python dependencies and then build ModMiiDownloader for all platforms

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install ccache for Nuitka
      run: |
        sudo apt update && \
        sudo apt install -y ccache patchelf
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Package
      run: python -m nuitka --show-progress --assume-yes-for-downloads main.py --onefile --enable-plugin=pyside6 -o ModMiiDownloader
    - name: Prepare Package for Upload
      run: |
        mv ModMiiDownloader ~/ModMiiDownloader
        cd ~
        tar cvf ModMiiDownloader.tar ModMiiDownloader
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        path: ~/ModMiiDownloader.tar
        name: ModMiiDownloader-Linux-bin

  build-windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1.13.0
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Package
      run: python -m nuitka --show-progress --assume-yes-for-downloads main.py -- --enable-plugin=pyside6 -o ModMiiDownloader.exe
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        path: D:\a\modmiiDownloader\modmiiDownloader\main.dist
        name: ModMiiDownloader-bin

  build-windows-onefile:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1.13.0
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Onefile Package
      run: python -m nuitka --show-progress --assume-yes-for-downloads main.py --onefile --enable-plugin=pyside6 -o ModMiiDownloader.exe
    - name: Upload Onefile Package
      uses: actions/upload-artifact@v4
      with:
        path: D:\a\modmiiDownloader\modmiiDownloader\ModMiiDownloader.exe
        name: ModMiiDownloader-onefile-bin
